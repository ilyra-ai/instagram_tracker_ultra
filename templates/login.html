<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Instagram Tracker Ultra</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-bg {
            background: var(--aurora-gradient);
            background-size: 200% 200%;
            animation: aurora-shift 10s ease infinite;
        }
        @keyframes aurora-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-card {
            background: var(--card);
            border-radius: var(--radius-xl);
            box-shadow: 0 16px 48px rgba(21,21,37,0.12);
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: hsl(var(--muted-foreground));
        }
        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 1px solid hsl(var(--input));
            border-radius: var(--radius);
            background: var(--card);
            color: hsl(var(--foreground));
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 2px hsl(var(--ring)/0.2);
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: var(--radius-full);
            background-image: var(--teal-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: scale(0.98);
            box-shadow: 0 4px 20px rgba(38,166,154,0.25);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">

    <!-- Orbs flutuantes -->
    <div class="fixed top-20 left-20 w-64 h-64 bg-purple-400/20 rounded-full blur-3xl animate-float" style="animation-duration: 8s;"></div>
    <div class="fixed bottom-20 right-20 w-80 h-80 bg-teal-400/20 rounded-full blur-3xl animate-float" style="animation-duration: 12s;"></div>

    <div class="login-card z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-50 text-teal-600 mb-4">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 display-font mb-2">Bem-vindo(a)</h1>
            <p class="text-gray-500 text-sm">Acesse seu portal de longevidade cósmica</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <i data-lucide="mail"></i>
                <input type="email" id="email" placeholder="Seu email" required>
            </div>
            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            
            <div class="flex items-center justify-between mb-6 text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="rounded border-gray-300 text-teal-600 focus:ring-teal-500">
                    <span class="text-gray-600">Lembrar-me</span>
                </label>
                <a href="#" class="text-teal-600 hover:text-teal-700 font-medium transition-colors">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-primary mb-4 flex items-center justify-center gap-2">
                <span>Entrar no Portal</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
            
            <div id="error-message" class="hidden text-red-500 text-sm text-center mb-4 bg-red-50 p-2 rounded-lg"></div>
        </form>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">Novo por aqui?</span>
            </div>
        </div>

        <button type="button" class="w-full py-3 px-4 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">
            Criar conta gratuita
        </button>
    </div>

    <script>
        lucide.createIcons();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('error-message');

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Autenticando...';
            lucide.createIcons();
            errorDiv.classList.add('hidden');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    window.location.href = '/app';
                } else {
                    const data = await res.json();
                    errorDiv.textContent = data.error || 'Credenciais inválidas';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Erro de conexão';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Entrar no Portal</span><i data-lucide="arrow-right" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
